<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Références & Cas d'usage | OPValue+ – Operating Partners</title>
<meta name="description" content="Découvrez nos références et cas d'usage : +100M€ de valeur générée, 25+ missions accompagnées, transformations et redressements réussis.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- PAGE HEADER -->
<section class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb">
      <a href="index.html">Accueil</a> <span>›</span> <span>Références & Cas d'usage</span>
    </div>
    <h1>Références & <em>impacts</em></h1>
  </div>
</section>

<!-- RESULTS -->
<section class="results" id="results">
  <div class="results-inner">
    <div class="section-label reveal">Nos résultats</div>
    <h2 class="section-title reveal">Ce que nous avons <em>accompli</em></h2>

    <div class="results-headline reveal reveal-delay-1">
      <div class="big-stat">+100M€</div>
      <p id="results-subtitle">de valeur générée, captée, ou sécurisée en 25 missions</p>
    </div>

    <!-- Result categories -->
    <div class="results-grid" id="results-grid"></div>

    <!-- Case studies -->
    <h3 class="cases-title reveal">Fiches missions détaillées</h3>
    <div class="cases-grid" id="cases-grid"></div>
  </div>
</section>

<!-- CTA BANNER -->
<section class="cta-banner">
  <div class="cta-banner-inner">
    <div class="cta-item reveal reveal-delay-1"><a href="equipe.html">Rencontrez l'équipe <span class="arrow">→</span></a></div>
    <div class="cta-divider"></div>
    <div class="cta-item reveal reveal-delay-2"><a href="contact.html">Parlons de vos enjeux <span class="arrow">→</span></a></div>
  </div>
</section>

<script src="js/site-content.js"></script>
<script src="js/site-images.js"></script>
<script src="js/tous-les-membres.js"></script>
<script src="js/membres/fp.js"></script>
<script src="js/membres/fg.js"></script>
<script src="js/membres/nb.js"></script>
<script src="js/membres/bdp.js"></script>
<script src="js/membres/ol.js"></script>
<script src="js/membres/cq.js"></script>
<script src="js/membres/bh.js"></script>
<script src="js/components.js"></script>
<script>
const C = SITE_CONTENT;

// Subtitle
const subtitleEl = document.getElementById('results-subtitle');
if (subtitleEl && C.references) subtitleEl.textContent = C.references.subtitle;

// Result categories
const resultsGrid = document.getElementById('results-grid');
if (C.references && C.references.categories) {
  resultsGrid.innerHTML = C.references.categories.map((cat, i) => {
    const metrics = cat.items.slice(1).map(item =>
      `<div class="result-metric"><span>${item}</span></div>`
    ).join('');
    return `<div class="result-card reveal reveal-delay-${(i%4)+1}">
      <div class="result-cat">${cat.titre}</div>
      <h5>${cat.items[0]}</h5>
      <div class="result-metrics">${metrics}</div>
    </div>`;
  }).join('');
}

// Case studies from all members
const casesGrid = document.getElementById('cases-grid');
const membres = COMPONENTS.getAllMembres();
if (membres && membres.length > 0) {
  const allCards = [];
  membres.forEach(membre => {
    if (membre.missions && Array.isArray(membre.missions)) {
      membre.missions.forEach(mission => {
        const name = `${membre.prenom} ${membre.nom}`;
        allCards.push(`<div class="case-card">
          <div class="case-header">
            <div class="case-name">${mission.contexte}</div>
            <div class="case-type">${mission.type}</div>
          </div>
          <div class="case-meta"><span>${name}</span></div>
          <div class="case-context">${mission.detail}</div>
          <div class="case-result"><span class="result-arrow">→</span> ${mission.resultat}</div>
          <div class="case-expand">
            <div class="case-section-label">Contexte</div>
            <div class="case-section-text">${mission.contexte}</div>
            <div class="case-section-label">Actions menées</div>
            <div class="case-section-text">${mission.detail}</div>
            <div class="case-section-label">Résultat obtenu</div>
            <div class="case-section-text">${mission.resultat}</div>
            <div class="case-section-label">Operating Partner</div>
            <div class="case-section-text">${name}</div>
          </div>
          <button class="case-toggle" style="background:none;border:none;cursor:pointer">Voir le détail ▾</button>
        </div>`);
      });
    }
  });
  casesGrid.innerHTML = allCards.join('');

  // Toggle
  document.querySelectorAll('.case-card').forEach(card => {
    const toggle = card.querySelector('.case-toggle');
    if (toggle) {
      toggle.addEventListener('click', () => {
        card.classList.toggle('open');
        toggle.textContent = card.classList.contains('open') ? 'Masquer le détail ▴' : 'Voir le détail ▾';
      });
    }
  });
}

COMPONENTS.init('references');
</script>
</body>
</html>
