<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | OPValue+ – Des dirigeants au service des dirigeants</title>
<meta name="description" content="Parlons-en. Contactez OPValue+ pour démarrer une conversation avec l'un de nos Operating Partners expérimentés.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- PAGE HEADER -->
<section class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb">
      <a href="index.html">Accueil</a> <span>›</span> <span>Contact</span>
    </div>
    <div class="section-label">Parlons-en</div>
    <h1>Une conversation peut suffire à <em>débloquer une situation</em></h1>
  </div>
</section>

<!-- CONTACT BOX -->
<section class="contact">
  <div class="contact-inner">
    <div class="contact-box reveal">
      <div class="contact-box-bg"></div>
      <div class="contact-box-overlay"></div>
      <h3>Comment <em>démarrer</em> ?</h3>
      <p id="contact-subtitle"></p>
      <div class="contact-steps" id="contact-steps"></div>
      <a id="contact-cta-btn" href="#" class="btn-primary">Échangeons →</a>
    </div>
  </div>
</section>

<!-- TEAM CONTACT LIST -->
<section class="contact-membres">
  <h2 class="contact-membres-title">Contactez directement un <em>Operating Partner</em></h2>
  <div class="cm-grid" id="cm-grid"></div>
</section>

<!-- CTA BANNER -->
<section class="cta-banner">
  <div class="cta-banner-inner">
    <div class="cta-item reveal reveal-delay-1"><a href="offre.html">Découvrez notre offre <span class="arrow">→</span></a></div>
    <div class="cta-divider"></div>
    <div class="cta-item reveal reveal-delay-2"><a href="operating-partner.html">Qu'est-ce qu'un Operating Partner ? <span class="arrow">→</span></a></div>
  </div>
</section>

<script src="js/site-content.js"></script>
<script src="js/site-images.js"></script>
<script src="js/tous-les-membres.js"></script>
<script src="js/membres/fp.js"></script>
<script src="js/membres/fg.js"></script>
<script src="js/membres/nb.js"></script>
<script src="js/membres/bdp.js"></script>
<script src="js/membres/ol.js"></script>
<script src="js/membres/cq.js"></script>
<script src="js/membres/bh.js"></script>
<script src="js/components.js"></script>
<script>
const C = SITE_CONTENT;

// Subtitle
const subtitleEl = document.getElementById('contact-subtitle');
if (subtitleEl && C.contact) subtitleEl.textContent = C.contact.subtitle;

// Steps
const stepsEl = document.getElementById('contact-steps');
if (C.demarrage && C.demarrage.etapes) {
  stepsEl.innerHTML = C.demarrage.etapes.map((etape, i) =>
    `<div class="contact-step">
       <div class="step-num">${i+1}</div>
       <div class="step-label">${etape}</div>
     </div>`
  ).join('');
}

// CTA button
const ctaBtn = document.getElementById('contact-cta-btn');
if (ctaBtn && C.contact) {
  ctaBtn.href = 'mailto:' + C.contact.email_general;
  if (C.demarrage && C.demarrage.cta) ctaBtn.textContent = C.demarrage.cta;
}

// Member contact grid
const cmGrid = document.getElementById('cm-grid');
const membres = COMPONENTS.getAllMembres();
if (membres && membres.length > 0) {
  cmGrid.innerHTML = membres.map((m, i) =>
    `<div class="cm-card reveal reveal-delay-${(i%4)+1}">
       <div class="cm-avatar">
         <img src="" data-portrait="${m.id}" onerror="this.style.display='none'" alt="${m.prenom} ${m.nom}">
       </div>
       <div>
         <div class="cm-name">${m.prenom} ${m.nom}</div>
         <div class="cm-email"><a href="mailto:${m.email}">${m.email}</a></div>
         <div class="cm-tel">${m.tel}</div>
         <a href="${m.linkedin}" class="cm-linkedin" target="_blank" rel="noopener">LinkedIn →</a>
       </div>
     </div>`
  ).join('');

  COMPONENTS.injectPortraits();
}

COMPONENTS.init('contact');
</script>
</body>
</html>
