<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'équipe | OPValue+ – Operating Partners</title>
<meta name="description" content="Découvrez nos Operating Partners : des dirigeants expérimentés et complémentaires, formés au programme CAPOP.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- PAGE HEADER -->
<section class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb">
      <a href="index.html">Accueil</a> <span>›</span> <span>L'équipe</span>
    </div>
    <h1>Un groupe de dirigeants aguerris, alignés, <em>complémentaires</em></h1>
  </div>
</section>

<!-- COLLECTIF -->
<section class="collectif">
  <div class="collectif-inner">
    <div class="section-label reveal">Qui nous sommes</div>
    <h2 class="section-title reveal">Notre <em>collectif</em></h2>
    <p class="collectif-desc reveal" id="collectif-desc"></p>

    <div class="team-badges reveal">
      <div class="team-badge">🎓 Certifiés CAPOP</div>
      <div class="team-badge">🌐 Réseau d'experts</div>
      <div class="team-badge">📈 Anciens dirigeants</div>
    </div>

    <div class="collectif-grid" id="collectif-cards"></div>
  </div>
</section>

<!-- TEAM -->
<section class="team" id="team-section">
  <div class="team-inner">
    <div class="section-label reveal">Choisissez votre Operating Partner</div>
    <h2 class="section-title reveal">L'<em>équipe</em></h2>
    <div class="team-grid" id="team-grid"></div>
  </div>
</section>

<!-- CTA BANNER -->
<section class="cta-banner">
  <div class="cta-banner-inner">
    <div class="cta-item reveal reveal-delay-1"><a href="references.html">Voir nos cas d'usage <span class="arrow">→</span></a></div>
    <div class="cta-divider"></div>
    <div class="cta-item reveal reveal-delay-2"><a href="contact.html">Parlons de vos enjeux <span class="arrow">→</span></a></div>
  </div>
</section>

<script src="js/site-content.js"></script>
<script src="js/site-images.js"></script>
<script src="js/tous-les-membres.js"></script>
<script src="js/membres/fp.js"></script>
<script src="js/membres/fg.js"></script>
<script src="js/membres/nb.js"></script>
<script src="js/membres/bdp.js"></script>
<script src="js/membres/ol.js"></script>
<script src="js/membres/cq.js"></script>
<script src="js/membres/bh.js"></script>
<script src="js/components.js"></script>
<script>
const C = SITE_CONTENT;

// Collectif description + cards
if (C.collectif) {
  document.getElementById('collectif-desc').textContent =
    C.collectif.blocs.map(b => b.texte).join(' ');

  document.getElementById('collectif-cards').innerHTML =
    C.collectif.blocs.map((bloc, i) =>
      `<div class="collectif-card reveal reveal-delay-${(i%4)+1}">
         <h4>${bloc.titre}</h4>
         <p>${bloc.texte}</p>
       </div>`
    ).join('');
}

// Team grid
const teamGrid = document.getElementById('team-grid');
const membres = COMPONENTS.getAllMembres();

if (membres && membres.length > 0) {
  membres.forEach((m, idx) => {
    const missionsSummary = (m.missions || []).map(mi =>
      `<div style="margin-bottom:.75rem">
        <strong>${mi.contexte}</strong> — <em>${mi.type}</em><br>
        ${mi.detail}<br>
        <span style="color:var(--orange)">→ ${mi.resultat}</span>
      </div>`
    ).join('');

    const card = document.createElement('div');
    card.className = `member reveal reveal-delay-${(idx%4)+1}`;
    card.innerHTML = `
      <div class="member-top">
        <div class="member-avatar">
          <img src="" data-portrait="${m.id}" onerror="this.style.display='none'" alt="${m.prenom} ${m.nom}">
        </div>
        <div class="member-info">
          <h5>${m.prenom} ${m.nom}</h5>
          <div class="member-focus">${m.expertises}</div>
        </div>
      </div>
      <p><strong>Cibles :</strong> ${m.cibles}</p>
      <p><strong>Secteurs :</strong> ${m.secteurs}</p>
      <div class="member-detail">
        <div class="member-detail-label">Missions réalisées</div>
        <div class="member-detail-text">${missionsSummary}</div>
        <a href="${m.linkedin}" class="member-linkedin" target="_blank" rel="noopener">LinkedIn →</a>
      </div>
    `;
    card.addEventListener('click', () => card.classList.toggle('open'));
    teamGrid.appendChild(card);
  });

  COMPONENTS.injectPortraits();
}

COMPONENTS.init('equipe');
</script>
</body>
</html>
